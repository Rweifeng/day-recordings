<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>day-recordings</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <section class="left-panel card">
      <header class="section-head">
        <h2>日历</h2>
        <div class="calendar-actions">
          <button id="prevMonthBtn" class="ghost-btn" aria-label="上个月">◀</button>
          <span id="monthLabel"></span>
          <button id="nextMonthBtn" class="ghost-btn" aria-label="下个月">▶</button>
        </div>
      </header>
      <div id="calendarGrid" class="calendar-grid"></div>

      <div class="input-area">
        <h2>输入 / 拖入框</h2>
        <div id="dropZone" class="drop-zone" tabindex="0">
          <p>将文件、文字或链接拖到这里</p>
          <p>或在下方粘贴内容后保存</p>
          <label class="file-picker">
            选择文件
            <input id="fileInput" type="file" multiple />
          </label>
        </div>
        <input id="tagInput" type="text" placeholder="标签（逗号分隔，如 项目A,会议）" />
        <textarea id="textInput" placeholder="记录今天处理了什么，或粘贴链接..."></textarea>
        <div class="input-actions">
          <button id="saveTextBtn" class="primary-btn">保存文本/链接</button>
          <button id="clearDateBtn" class="ghost-btn">清空当天记录</button>
          <button id="exportBtn" class="ghost-btn">导出备份</button>
          <label class="file-picker">
            导入备份
            <input id="importInput" type="file" accept="application/json,.json" />
          </label>
        </div>
      </div>
    </section>

    <section class="timeline-panel card">
      <header class="section-head">
        <h2>时间轴</h2>
        <div class="timeline-filter">
          <button id="layoutModeBtn" class="ghost-btn" type="button">布局: 普通</button>
          <button id="topMostBtn" class="ghost-btn" type="button">置顶: 关</button>
          <button id="settingsBtn" class="ghost-btn" type="button">设置</button>
          <label for="favOnlyCheck">仅看收藏</label>
          <input id="favOnlyCheck" type="checkbox" />
        </div>
      </header>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="搜索内容/文件名/标签..." />
        <select id="typeFilter">
          <option value="all">全部类型</option>
          <option value="text">文本</option>
          <option value="link">链接</option>
          <option value="file">文件</option>
        </select>
        <label><input id="dupOnlyCheck" type="checkbox" />重复</label>
        <label><input id="deletedOnlyCheck" type="checkbox" />回收站</label>
      </div>
      <p id="selectedDateLabel" class="selected-date"></p>
      <ul id="timelineList" class="timeline-list"></ul>
      <button id="loadMoreBtn" class="ghost-btn" type="button">加载更多</button>
    </section>
  </div>

  <div id="saveStatusBar" class="save-status">状态：空闲</div>
  <div id="toastContainer" class="toast-container"></div>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog" class="settings-form">
      <h3>设置</h3>
      <label class="setting-item checkbox-item"><input id="skipDupImportCheck" type="checkbox" /> 导入时跳过重复</label>
      <label class="setting-item checkbox-item"><input id="closeToTrayCheck" type="checkbox" /> 点击关闭按钮时最小化到托盘</label>
      <label class="setting-item">
        默认布局
        <select id="defaultLayoutSelect">
          <option value="normal">普通</option>
          <option value="compact">紧凑</option>
          <option value="ultra">超紧凑</option>
        </select>
      </label>
      <div class="setting-item">
        <span>路径重映射（修复迁移后文件路径）</span>
        <input id="pathFromInput" type="text" placeholder="旧根路径，如 D:\\old-data" />
        <input id="pathToInput" type="text" placeholder="新根路径，如 E:\\new-data" />
        <button id="applyPathMapBtn" class="ghost-btn" type="button">应用重映射</button>
      </div>
      <div class="settings-actions">
        <button id="saveSettingsBtn" class="primary-btn" type="button">保存设置</button>
        <button class="ghost-btn" type="submit">关闭</button>
      </div>
    </form>
  </dialog>

  <dialog id="guideDialog" class="guide-dialog">
    <form method="dialog" class="guide-content">
      <h3>首次使用说明</h3>
      <p>1. 拖入文件/文字/链接即可记录。</p>
      <p>2. 记录默认按今天日期保存。</p>
      <p>3. 可通过“布局”切换普通/紧凑/超紧凑模式。</p>
      <p>4. `Ctrl+Shift+D` 可快速唤起输入框。</p>
      <button class="primary-btn" type="submit">我知道了</button>
    </form>
  </dialog>

  <template id="timelineItemTemplate">
    <li class="timeline-item">
      <div class="timeline-point"></div>
      <div class="timeline-card">
        <div class="timeline-meta">
          <span class="timeline-time"></span>
          <div class="timeline-tags">
            <span class="timeline-type"></span>
            <button class="star-btn" title="收藏/取消收藏">☆</button>
            <button class="delete-btn" title="删除">删除</button>
          </div>
        </div>
        <div class="timeline-content"></div>
      </div>
    </li>
  </template>

  <script src="./app.js"></script>
</body>
</html>
